# This workflow will run tests

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x
    - name: Run unit tests
      run: dotnet test tests/tests.csproj
    - name: Build cli
      run: dotnet build cli/codec8cli.csproj
